name: Refresh profile card

on:
  schedule:
    - cron: "0 21 * * *" # 05:00 MYT daily
  workflow_dispatch:
  push:
    branches: [main]
    paths: [generate_profile.py]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate profile.svg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 generate_profile.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile.svg
          git diff --cached --quiet || { git commit -m "chore: refresh profile card"; git push; }
